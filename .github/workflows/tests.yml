name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4', '8.5']
        laravel: ['11.*', '12.*', '13.*']
        exclude:
          - php: '8.5'
            laravel: '11.*'
          - php: '8.2'
            laravel: '13.*'
        include:
          - laravel: '11.*'
            testbench: '9.*'
          - laravel: '12.*'
            testbench: '10.*'
          - laravel: '13.*'
            testbench: '11.*'

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pdo, pdo_sqlite
          coverage: xdebug

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" --no-interaction --no-update
          composer update --prefer-dist --no-interaction

      - name: Run tests with coverage
        run: XDEBUG_MODE=coverage vendor/bin/phpunit --coverage-clover coverage.xml

      - name: Check code coverage threshold
        run: |
          COVERAGE=$(php -r "
          \$xml = new SimpleXMLElement(file_get_contents('coverage.xml'));
          \$metrics = \$xml->project->metrics;
          echo (int)\$metrics['coveredstatements'] . ',' . (int)\$metrics['statements'];
          " | awk -F',' '{printf \"%.1f\", (\$1/\$2)*100}')
          
          echo \"Code Coverage: ${COVERAGE}%\"
          
          # Use Python for accurate percentage calculation
          python3 << 'EOF'
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage.xml')
          root = tree.getroot()
          covered = int(root.find('.//project/metrics').get('coveredstatements', 0))
          total = int(root.find('.//project/metrics').get('statements', 0))
          percentage = (covered / total * 100) if total > 0 else 0
          print(f"Code Coverage: {percentage:.1f}%")
          if percentage < 90:
              print(f"ERROR: Code coverage {percentage:.1f}% is below 90% threshold")
              exit(1)
          print(f"SUCCESS: Code coverage {percentage:.1f}% meets 90% threshold")
          EOF
